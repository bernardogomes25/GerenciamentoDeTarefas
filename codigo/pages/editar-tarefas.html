<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Tarefas</title>
    <link rel="stylesheet" href="../assets/css/editar-tarefas.css" />
    <script src="../assets/js/editar.js" type="module" defer></script>
  </head>
  <body>
    <!--Inicio da Navbar principal-->
    <nav>
      <img id="logo" src="../assets/images/logo.png" alt="" srcset="" />
      <div class="nav-container">
        <a href="main.html"><h1>Calendário</h1></a>
        <a href="kanban.html"><h1>Projetos</h1></a>
        <a href="buscar.html"><h1>Buscar</h1></a>
        <a href="tarefas.html"><h1>Tarefas</h1></a>
      </div>
      <img id="perfil" src="../assets/images/perfil.png" alt="" srcset="" />
    </nav>
    <!--Fim da navbar principal-->

    <div class="container"> 
      <div class="info-tarefa">
        <h1>Edite Sua Tarefa! Não deixe nada em branco</h1>
        
      </div>
      <div class="campos">
        <form id="form" type="submit">
          <h2>Título</h2>
          <input type="text" placeholder="Adicione um Título" id="titulo" />
          <h2>Data</h2>
          <input type="date" id="data"/>
          <h2>Hora</h2>
          <input type="time" id="hora" />
          <div class="botao">
            <button type="submit" class="button-1" role="button">Confirmar</button>
            <button type="reset" class="button-1" style="background-color: crimson;" role="button">Cancelar</button>
            </div>
        </form>
      
      </div>
      
    </div>
  </body>
</html>
